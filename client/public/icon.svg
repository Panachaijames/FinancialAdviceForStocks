<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="PT Financial Advisor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141b2b"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#bg)"/>
  <!-- area under the rising line -->
  <path d="M96 352 L176 300 L240 328 L312 220 L416 148 L416 392 L96 392 Z" fill="url(#fill)"/>
  <!-- the rising line -->
  <path d="M96 352 L176 300 L240 328 L312 220 L416 148"
        fill="none" stroke="url(#line)" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- head-of-line accent dot -->
  <circle cx="416" cy="148" r="24" fill="#3b82f6"/>
  <circle cx="416" cy="148" r="11" fill="#e6eaf2"/>
</svg>
