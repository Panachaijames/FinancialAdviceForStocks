name: keep-render-awake

# Render's free tier spins the server down after ~15 min idle (a ~30-60s cold
# start on next hit). Since the mobile app now loads its UI from the cloud, we
# ping the health endpoint every ~10 min to keep it warm so the app opens fast.
# Note: GitHub scheduled runs can be delayed under load — for rock-solid uptime,
# a free external monitor (e.g. UptimeRobot, 5-min interval) is more punctual.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 60 https://pt-financial-advisor-u9fr.onrender.com/api/health || true
