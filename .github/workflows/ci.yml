name: CI

# Runs the test suite + a production build on every push and PR. With
# render.yaml's autoDeploy, an untested push to the deploy branch goes straight
# to the URL every installed shell loads — this is the gate that catches a red
# build or a failing test before that happens.

on:
  push:
    branches: [master, release]
  pull_request:
    branches: [master, release]
  workflow_dispatch: {}

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build client
        run: npm run build
