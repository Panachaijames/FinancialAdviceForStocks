name: Build Windows App

# Builds the Windows desktop app and, on a version tag (e.g. v1.0.0), attaches
# the portable + installer .exe to a GitHub Release.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
# A run can also be triggered manually (Actions tab -> Run workflow); manual runs
# upload the .exe as a workflow artifact instead of creating a Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create/update the GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build client
        run: npm run build

      - name: Build Windows installer + portable (electron-builder)
        run: npx electron-builder --win --publish never
        env:
          # No code-signing certificate -> skip signing discovery (unsigned build).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: dir release
        shell: cmd

      - name: Publish to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: PT-Financial-Advisor-Windows
          path: release/*.exe
          if-no-files-found: error
