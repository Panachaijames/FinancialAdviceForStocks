<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PT Financial Advisor — reconnecting</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0b0e14; color: #e6e9ef;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center; padding: 24px;
      }
      .card { max-width: 440px; }
      .dot {
        width: 44px; height: 44px; margin: 0 auto 20px; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #3987e5, #9085e9);
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: .45; transform: scale(.9); } 50% { opacity: 1; transform: scale(1); } }
      h1 { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
      p { font-size: 13.5px; line-height: 1.6; color: #9aa4b8; margin: 0 0 20px; }
      a.retry {
        display: inline-block; text-decoration: none; font-size: 13px; font-weight: 600;
        color: #fff; background: #3987e5; padding: 9px 18px; border-radius: 8px;
      }
      a.retry:hover { background: #2f76cc; }
      .hint { margin-top: 16px; font-size: 11px; color: #5d6679; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dot" role="img" aria-label="Reconnecting"></div>
      <h1>Can't reach PT Financial Advisor</h1>
      <p>
        The app couldn't load from the cloud. The free server may be waking up
        (this can take ~30&nbsp;seconds), or you may be offline. It's retrying
        automatically — your data is safe on this device.
      </p>
      <a class="retry" href="https://pt-financial-advisor-u9fr.onrender.com">Retry now</a>
      <div class="hint">Retrying automatically every few seconds…</div>
    </div>
  </body>
</html>
